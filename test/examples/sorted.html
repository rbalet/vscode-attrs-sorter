<!doctype html>
<html>
	<body>
		<a
			class="btn btn-primary"
			id="docs-link"
			data-track="cta"
			href="/docs"
			role="button"
			aria-label="Open docs"
			tabindex="0"
			style="color: red"
			target="_blank"
			rel="noopener"
		>
			Docs
		</a>

		<input
			class="field"
			id="username"
			name="username"
			data-a="a"
			data-z="z"
			type="text"
			value="Raphael"
			aria-label="Username"
			tabindex="2"
			style="border: 1px solid #ccc"
			autocomplete="off"
			required
		/>

		<img
			class="hero-image"
			id="cover"
			data-src="/img/cover@2x.jpg"
			src="/img/cover.jpg"
			title="Main cover"
			alt="Cover"
			role="img"
			aria-hidden="false"
			style="display: block"
			width="320"
			decoding="async"
			loading="lazy"
			height="180"
		/>
	</body>
</html>
